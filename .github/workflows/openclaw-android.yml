name: Build OpenClaw Android (debug)

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout andClaw
        uses: actions/checkout@v4
        with:
          repository: coderredlab/andClaw
          path: andClaw

      - name: Checkout ClawMobile
        uses: actions/checkout@v4
        with:
          repository: ClawMobile/ClawMobile
          path: ClawMobile

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the Android plugin
        run: |
          cd ClawMobile/openclaw-plugin-mobile-ui
          npm install
          npm run build

      - name: Copy plugin assets into the app
        run: |
          cp -r ClawMobile/openclaw-plugin-mobile-ui/dist/* andClaw/app/src/main/assets/openclaw-plugin-mobile-ui/
          cp ClawMobile/openclaw-plugin-mobile-ui/openclaw.plugin.json andClaw/app/src/main/assets/openclaw-plugin-mobile-ui/

      - name: Install Android SDK (API 34 + Build‑Tools 34.0.0)
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Build debug APK
        working-directory: ./andClaw
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-debug-apk
          path: andClaw/app/build/outputs/apk/debug/*.apk
